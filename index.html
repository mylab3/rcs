<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricerca Codice Stazione</title>
    <style>
        :root {
            --primary: #1e1b4b;
            --text-muted: #64748b;
            --bg-body: #f1f5f9;
            --card-bg: #ffffff;
            --input-bg: #f8fafc;
            --border-color: #cbd5e1;
            --accent: #4f46e5;
            --success: #10b981;
            --success-bg: #d1fae5;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 580px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .header-title svg {
            color: var(--accent);
            width: 24px;
            height: 24px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 16px;
        }

        .counter-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            background-color: #e0e7ff;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .divider {
            height: 1px;
            background-color: #f1f5f9;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group.flex-1 {
            flex: 1;
            position: relative;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 0.95rem;
            color: #334155;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Spazio a destra per l'icona "X" */
        #stazioneInput {
            padding-right: 32px;
        }

        input:focus {
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        input[readonly] {
            text-align: center;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: #475569;
            cursor: default;
        }

        /* Pulsante reset "X" discreto */
        .btn-clear {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: none;
            padding: 4px;
            border-radius: 50%;
            line-height: 0;
            transition: all 0.2s ease;
        }

        .btn-clear:hover {
            color: var(--primary);
            background-color: #e2e8f0;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-top: 4px;
            display: none;
        }

        .dropdown-item {
            padding: 10px 12px;
            font-size: 0.9rem;
            color: #334155;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background-color: #e0e7ff;
            color: var(--accent);
            font-weight: 500;
        }

        .btn-copy {
            height: 42px;
            width: 42px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .btn-copy:hover {
            background-color: #e2e8f0;
            color: var(--primary);
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        .btn-copy.copied {
            background-color: var(--success-bg);
            border-color: var(--success);
            color: var(--success);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-title">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3" />
        </svg>
        <h1>Ricerca Codice Stazione</h1>
    </div>
    <p class="subtitle">Digita il nome e seleziona la stazione dalla lista per rivelarne il codice.</p>
    
    <div id="counter" class="counter-badge">Caricamento XML in corso...</div>

    <div class="divider"></div>

    <div class="form-row">
        <!-- Campo Stazione con tasto pulizia -->
        <div class="field-group flex-1">
            <label for="stazioneInput">NOME STAZIONE</label>
            <div class="input-wrapper">
                <input type="text" id="stazioneInput" placeholder="Es. Torino, Milano, Genova..." autocomplete="off">
                <button id="clearBtn" class="btn-clear" onclick="clearAll()" title="Pulisci campi">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="dropdownMenu" class="dropdown-menu"></div>
        </div>

        <!-- Campo Codice -->
        <div class="field-group flex-1">
            <label for="codiceInput">CODICE STAZIONE</label>
            <input type="text" id="codiceInput" placeholder="------" readonly>
        </div>

        <!-- Pulsante Copia -->
        <button id="copyBtn" class="btn-copy" onclick="copyCode()" title="Copia codice">
            <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        </button>
    </div>
</div>

<script>
    const stazioniList = [];
    const inputStazione = document.getElementById('stazioneInput');
    const inputCodice = document.getElementById('codiceInput');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    const iconCopy = `<path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />`;
    const iconCheck = `<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />`;

    fetch('stazioni2.xml')
        .then(response => {
            if (!response.ok) throw new Error("File stazioni2.xml non trovato");
            return response.text();
        })
        .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
        .then(xml => {
            parseXMLUniversal(xml);
        })
        .catch(err => {
            const counter = document.getElementById('counter');
            counter.innerText = "Errore: " + err.message;
            counter.style.backgroundColor = "#fecaca";
            counter.style.color = "#991b1b";
        });

    function parseXMLUniversal(xml) {
        let allElements = Array.from(xml.querySelectorAll('*'));
        let stazioniTrovate = 0;
        let nomiSalvati = new Set();

        allElements.forEach(node => {
            let nome = null;
            let codice = null;

            let children = Array.from(node.children);
            if (children.length > 0) {
                children.forEach(child => {
                    let tag = child.tagName.toLowerCase();
                    let text = child.textContent.trim();

                    if (tag.includes('nome') || tag.includes('stazione') || tag.includes('denominazione') || tag.includes('des')) {
                        nome = text;
                    }
                    if (tag.includes('cod') || tag.includes('id') || tag.includes('key')) {
                        codice = text;
                    }
                });
            }

            if (!nome || !codice) {
                Array.from(node.attributes).forEach(attr => {
                    let attrName = attr.name.toLowerCase();
                    let attrVal = attr.value.trim();

                    if (attrName.includes('nome') || attrName.includes('stazione') || attrName.includes('des')) {
                        nome = attrVal;
                    }
                    if (attrName.includes('cod') || attrName.includes('id')) {
                        codice = attrVal;
                    }
                });
            }

            if (!nome && children.length === 2) {
                let txt1 = children[0].textContent.trim();
                let txt2 = children[1].textContent.trim();

                if (isNaN(txt1) && !isNaN(txt2)) { nome = txt1; codice = txt2; }
                else if (!isNaN(txt1) && isNaN(txt2)) { codice = txt1; nome = txt2; }
            }

            if (nome && codice && !nomiSalvati.has(nome.toLowerCase())) {
                nomiSalvati.add(nome.toLowerCase());
                stazioniList.push({ nome: nome, codice: codice });
                stazioniTrovate++;
            }
        });

        stazioniList.sort((a, b) => a.nome.localeCompare(b.nome));
        document.getElementById('counter').innerText = `Record caricati: ${stazioniTrovate}`;
    }

    inputStazione.addEventListener('input', function() {
        const query = this.value.trim().toLowerCase();
        dropdownMenu.innerHTML = '';
        inputCodice.value = '';

        // Mostra o nasconde il tasto di reset "X"
        clearBtn.style.display = this.value.length > 0 ? 'block' : 'none';

        if (query.length === 0) {
            dropdownMenu.style.display = 'none';
            return;
        }

        const risultati = stazioniList.filter(item => item.nome.toLowerCase().includes(query));

        if (risultati.length > 0) {
            risultati.forEach(item => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerText = item.nome;
                div.addEventListener('click', function() {
                    inputStazione.value = item.nome;
                    inputCodice.value = item.codice;
                    dropdownMenu.style.display = 'none';
                    clearBtn.style.display = 'block';
                });
                dropdownMenu.appendChild(div);
            });
            dropdownMenu.style.display = 'block';
        } else {
            dropdownMenu.style.display = 'none';
        }
    });

    document.addEventListener('click', function(e) {
        if (!inputStazione.contains(e.target) && !dropdownMenu.contains(e.target)) {
            dropdownMenu.style.display = 'none';
        }
    });

    // Funzione di pulizia completa
    function clearAll() {
        inputStazione.value = '';
        inputCodice.value = '';
        dropdownMenu.style.display = 'none';
        clearBtn.style.display = 'none';
        inputStazione.focus();
    }

    function copyCode() {
        const codice = inputCodice.value;
        if (!codice) return;

        navigator.clipboard.writeText(codice).then(() => {
            const iconSvg = document.getElementById('copyIcon');
            
            copyBtn.classList.add('copied');
            iconSvg.innerHTML = iconCheck;

            setTimeout(() => {
                copyBtn.classList.remove('copied');
                iconSvg.innerHTML = iconCopy;
            }, 1500);
        });
    }
</script>

</body>
</html>
